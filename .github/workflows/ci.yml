name: CI

on:
  push:
    branches: [master, "agent/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runtime information
        run: node --version && npm --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check worker syntax
        run: node --check scripts/awin-detail-worker.mjs && node --check scripts/awin-scheduler.mjs

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/awin-build
          AWIN_API_TOKEN: build-placeholder
          ADMIN_API_KEY: build-placeholder
