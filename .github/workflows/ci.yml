name: CI

on:
  push:
    branches: [master, "agent/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runtime information
        run: node --version && npm --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Unit tests
        run: npm test

      - name: Lint
        id: lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Upload lint log
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log

      - name: Check worker syntax
        run: node --check scripts/awin-detail-worker.mjs && node --check scripts/awin-scheduler.mjs

      - name: Build
        id: build
        shell: bash
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/awin-build
          AWIN_API_TOKEN: build-placeholder
          ADMIN_API_KEY: build-placeholder
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
